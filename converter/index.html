<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workflow Table Converter</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: 13px; }
    button { margin-top: 12px; padding: 10px 24px; font-size: 15px; cursor: pointer; }
    #status { margin-top: 12px; color: green; font-size: 14px; }
    #error { margin-top: 12px; color: red; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Workflow Table Converter</h2>
  <p>Paste the LLM output (two markdown tables) below, then click Convert.</p>
  <textarea id="input" placeholder="Paste markdown tables here..."></textarea>
  <br>
  <button onclick="convert()">Convert &amp; Download CSVs</button>
  <div id="status"></div>
  <div id="error"></div>

  <script src="converter.js"></script>
</body>
</html>
