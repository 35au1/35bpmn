<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPMN Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="toolbar">
            <button id="theme-toggle">Toggle Theme</button>
            <button id="expand-all">Expand All Processes</button>
            <button id="collapse-all">Collapse All</button>
        </div>
        <div id="canvas-container">
            <svg id="canvas" width="100%" height="100%">
                <defs>
                    <marker id="arrowhead" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor" />
                    </marker>
                </defs>
            </svg>
        </div>
        <div class="palette">
            <div class="palette-item" data-type="start">Start</div>
            <div class="palette-item" data-type="end">End</div>
            <div class="palette-item" data-type="process">Process</div>
            <div class="palette-item" data-type="decision-x">Decision X</div>
            <div class="palette-item" data-type="decision-plus">Decision +</div>
            <div class="palette-item" data-type="comment">Comment</div>
            <div class="palette-item" data-type="external">External</div>
            <div class="palette-item" data-type="arrow">Arrow</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
